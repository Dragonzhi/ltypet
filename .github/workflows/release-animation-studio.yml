name: Animation Studio Release

on:
  push:
    tags:
      - 'animation-studio-v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/motion-editor/package-lock.json

      - name: Install motion-editor dependencies
        working-directory: tools/motion-editor
        run: npm ci

      - name: Run tests (motion-editor)
        working-directory: tools/motion-editor
        run: npm test

      - name: Build (motion-editor)
        working-directory: tools/motion-editor
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: tools/motion-editor/src-tauri/target

      - name: Rust check (motion-editor)
        run: cargo check --manifest-path tools/motion-editor/src-tauri/Cargo.toml

      - name: Rust test (motion-editor)
        run: cargo test --manifest-path tools/motion-editor/src-tauri/Cargo.toml

      - name: Rust fmt check (motion-editor)
        run: cargo fmt --manifest-path tools/motion-editor/src-tauri/Cargo.toml -- --check

      - name: Git diff check
        run: git diff --check

      - name: Release check (motion-editor)
        working-directory: tools/motion-editor
        run: npm run release:check

      - name: Build Tauri NSIS installer
        working-directory: tools/motion-editor
        run: npm run build:installer

      - name: Generate SHA256SUMS
        working-directory: tools/motion-editor
        run: |
          $outputPath = "sha256sums.txt"
          Remove-Item -Path $outputPath -ErrorAction SilentlyContinue
          Get-ChildItem -Path src-tauri\target\release\bundle\nsis -Filter *.exe | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -Path $_.FullName
            Add-Content -Path $outputPath -Value "$($hash.Hash)  $($_.Name)"
          }
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## LTypet Animation Studio ${{ github.ref_name }}

            请查看 [tools/motion-editor/CHANGELOG.md](https://github.com/Tylpet/ltypet/blob/main/tools/motion-editor/CHANGELOG.md) 了解完整变更。
          files: |
            tools/motion-editor/src-tauri/target/release/bundle/nsis/*.exe
            tools/motion-editor/sha256sums.txt
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
